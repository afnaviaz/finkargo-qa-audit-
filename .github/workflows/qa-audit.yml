name: QA Audit Multi-Project

on:
  workflow_dispatch:
    inputs:
      proyecto:
        description: "Selecciona el Proyecto a auditar"
        required: true
        default: "CORE"
        type: choice
        options:
          - CORE
          - FLOWS
      pais:
        description: "País a auditar"
        required: true
        default: "CO"
        type: choice
        options:
          - CO
          - MX
          - ALL
      ambiente:
        description: "Ambiente de ejecución"
        required: true
        default: "Testing"
        type: choice
        options:
          - Testing
          - Staging

jobs:
  run-audit:
    runs-on: self-hosted
    steps:
      # --- PASO 1: CLONADO LIMPIO DE LA RAMA ACTUAL ---
      # Usamos fetch-depth: 0 para asegurar que traiga la rama correcta (feature/multi-project-qa)
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Verify Structure
        run: |
          echo "📂 Estructura de carpetas actual:"
          ls -R
          echo "📍 Rama actual: ${{ github.ref }}"

      # --- PASO 2: EJECUCIÓN DEL SCRIPT MULTI-PROYECTO ---
      - name: Run QA Audit Script
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          CONF_TOKEN: ${{ secrets.CONF_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # El CONF_USER ya está en el script, pero puedes pasarlo como secreto si prefieres
        run: |
          echo "🚀 Iniciando auditoría para ${{ github.event.inputs.proyecto }}..."
          
          # Aseguramos permisos de ejecución
          chmod +x scripts/run_all.sh
          
          # EJECUCIÓN: Pasamos los 3 parámetros en el orden nuevo del script
          ./scripts/run_all.sh \
            "${{ github.event.inputs.proyecto }}" \
            "${{ github.event.inputs.pais }}" \
            "${{ github.event.inputs.ambiente }}"

      # --- PASO 3: PUBLICAR ANÁLISIS EN GITHUB SUMMARY ---
      - name: Publicar Análisis AI en Job Summary
        if: always()
        run: |
          # Buscamos el reporte generado por el script
          ANALYSIS_FILE=$(find . -name "claude-analysis.md" | head -n 1)
          
          echo "## 🤖 Análisis de Causa Raíz - Claude AI" >> $GITHUB_STEP_SUMMARY
          echo "**Proyecto:** ${{ github.event.inputs.proyecto }} | **País:** ${{ github.event.inputs.pais }} | **Ambiente:** ${{ github.event.inputs.ambiente }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "$ANALYSIS_FILE" ]; then
            cat "$ANALYSIS_FILE" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No se generó archivo de análisis detallado por Claude." >> $GITHUB_STEP_SUMMARY
          fi

      # --- PASO 4: SUBIDA DE ARTEFACTOS (EVIDENCIAS) ---
      - name: Upload Audit Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report-${{ github.event.inputs.proyecto }}-${{ github.event.inputs.pais }}
          path: |
            **/report_*.html
            **/results_*.json
            **/log_*.txt
          retention-days: 15