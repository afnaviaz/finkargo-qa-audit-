name: QA Audit Full Orchestrator

on:
  workflow_dispatch:
    inputs:
      proyecto:
        description: "Selecciona el Proyecto a auditar"
        required: true
        default: "CORE"
        type: choice
        options:
          - CORE
          - FLOWS
      pais:
        description: "País a auditar (ALL ejecutará CO y MX)"
        required: true
        default: "CO"
        type: choice
        options:
          - CO
          - MX
          - ALL
      ambiente:
        description: "Ambiente de ejecución"
        required: true
        default: "Testing"
        type: choice
        options:
          - Testing
          - Staging

permissions:
  contents: read
  actions: read

jobs:
  run-audit-pipeline:
    name: "Audit: ${{ github.event.inputs.proyecto }} - ${{ github.event.inputs.pais }}"
    runs-on: self-hosted
    steps:
      # --- PASO 1: DESCARGAR EL CÓDIGO ---
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # --- PASO 2: CONFIGURAR PERMISOS ---
      - name: Setup Permissions
        run: |
          echo "🔧 Configurando permisos de ejecución para el orquestador..."
          chmod +x scripts/run_all.sh

      # --- PASO 3: EJECUCIÓN DEL ORQUESTADOR (EL SCRIPT QUE ARREGLAMOS) ---
      - name: Execute QA Audit
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          CONF_TOKEN: ${{ secrets.CONF_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          echo "🚀 Iniciando Auditoría para ${{ github.event.inputs.proyecto }} en ${{ github.event.inputs.ambiente }}..."
          ./scripts/run_all.sh \
            "${{ github.event.inputs.proyecto }}" \
            "${{ github.event.inputs.pais }}" \
            "${{ github.event.inputs.ambiente }}"

      # --- PASO 4: RESPALDAR REPORTES EN GITHUB (OPCIONAL) ---
      - name: Upload Local Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.event.inputs.proyecto }}-${{ github.run_id }}
          path: |
            scripts/*.html
            scripts/*.json
            scripts/*.txt
          retention-days: 7